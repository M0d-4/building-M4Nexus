name: Build Boot Image

# Trigger manually and supply the two download links + build options.
on:
  workflow_dispatch:
    inputs:
      kernel_url:
        description: 'Direct URL to the kernel file (may be named "Image", "kernel", etc.)'
        required: true
        type: string
      ramdisk_url:
        description: 'Direct URL to the ramdisk file to pack alongside the kernel'
        required: true
        type: string
      cmdline:
        description: 'Kernel command line to embed in boot.img'
        required: false
        type: string
        default: ''
      base:
        description: 'Base address (hex)'
        required: false
        type: string
        default: '0x10000000'
      kernel_offset:
        description: 'Kernel offset (hex)'
        required: false
        type: string
        default: '0x00008000'
      ramdisk_offset:
        description: 'Ramdisk offset (hex)'
        required: false
        type: string
        default: '0x01000000'
      tags_offset:
        description: 'Tags offset (hex)'
        required: false
        type: string
        default: '0x00000100'
      page_size:
        description: 'Page size'
        required: false
        type: string
        default: '2048'
      make_tar:
        description: 'Also package boot.img into a boot.tar archive'
        required: false
        type: boolean
        default: false

jobs:
  build-boot-img:
    runs-on: ubuntu-latest
    steps:
      - name: Download kernel file
        run: |
          set -e
          curl -L -f -o kernel_download "${{ inputs.kernel_url }}"

          # Grab the original filename from the URL (strip query string, if any)
          orig_name=$(basename "${{ inputs.kernel_url }}" | cut -d'?' -f1)
          echo "Original kernel filename: $orig_name"

          # Normalize: if the file is named "image" (case-insensitive, no extension),
          # rename it to "kernel". Otherwise keep it as "kernel" too, since that's
          # the name the rest of the workflow expects.
          lower_name=$(echo "$orig_name" | tr '[:upper:]' '[:lower:]')
          if [ "$lower_name" = "image" ]; then
            echo "File is named 'image' -> renaming to 'kernel'"
          else
            echo "File is named '$orig_name' -> using as 'kernel'"
          fi

          mv kernel_download kernel
          ls -la kernel

      - name: Download ramdisk file
        run: |
          set -e
          curl -L -f -o ramdisk "${{ inputs.ramdisk_url }}"
          ls -la ramdisk

      - name: Install mkbootimg
        run: |
          set -e
          git clone --depth 1 https://android.googlesource.com/platform/system/tools/mkbootimg mkbootimg_src
          python3 -m pip install --user --upgrade pip
          chmod +x mkbootimg_src/mkbootimg.py

      - name: Build boot.img
        run: |
          set -e
          CMDLINE_ARG=""
          if [ -n "${{ inputs.cmdline }}" ]; then
            CMDLINE_ARG="--cmdline \"${{ inputs.cmdline }}\""
          fi

          python3 mkbootimg_src/mkbootimg.py \
            --kernel kernel \
            --ramdisk ramdisk \
            --base "${{ inputs.base }}" \
            --kernel_offset "${{ inputs.kernel_offset }}" \
            --ramdisk_offset "${{ inputs.ramdisk_offset }}" \
            --tags_offset "${{ inputs.tags_offset }}" \
            --pagesize "${{ inputs.page_size }}" \
            ${{ inputs.cmdline != '' && format('--cmdline "{0}"', inputs.cmdline) || '' }} \
            --output boot.img

          ls -la boot.img

      - name: Package boot.img into boot.tar
        if: ${{ inputs.make_tar }}
        run: |
          set -e
          tar -cvf boot.tar boot.img
          ls -la boot.tar

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: boot-img
          path: boot.img
          if-no-files-found: error

      - name: Upload boot.tar
        if: ${{ inputs.make_tar }}
        uses: actions/upload-artifact@v4
        with:
          name: boot-tar
          path: boot.tar
          if-no-files-found: error
